<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>엔트로피 자발성 시뮬레이터 | 사이음</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css");

    :root {
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --bg-color: #f8fafc;
      --text-main: #334155;
      --text-sub: #64748b;
      --border-color: #e2e8f0;
      --panel-bg: rgba(255, 255, 255, 0.95);
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    .ui-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 1.25rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }
    .btn-press {
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .btn-press:active { transform: scale(0.96); }

    /* GitHub 배포 버전과 동일한 label-xs */
    .label-xs {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-sub);
    }

    /* ── 스크롤바 ── */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* 해설 패널 — 가로 스크롤바 표시 */
    .step-scrollbar::-webkit-scrollbar { height: 4px; }
    .step-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 2px; }
    .step-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
    .step-scrollbar { scrollbar-width: thin; scrollbar-color: #94a3b8 #f1f5f9; }

    /* 반응 목록 — 가로 스크롤바 표시 */
    .rxn-scrollbar::-webkit-scrollbar { height: 3px; }
    .rxn-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .rxn-scrollbar::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 2px; }
    .rxn-scrollbar { scrollbar-width: thin; scrollbar-color: #a5b4fc transparent; }

    /* ── 기본 애니메이션 ── */
    .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float-gas {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(15px, -20px); }
      50%  { transform: translate(-10px, 15px); }
      75%  { transform: translate(-20px, -10px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes float-ion { 0% { transform: translate(0, 0); } 100% { transform: translate(6px, -6px); } }
    @keyframes pulse-sys { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

    /* ── 힌트 버튼 강조 (3회) ── */
    @keyframes hint-glow-amber {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(245,158,11,.65); }
      50%      { transform: scale(1.13); box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    }
    .hint-pulse-amber { animation: hint-glow-amber 0.85s ease-in-out 3; }

    @keyframes hint-glow-cyan {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(6,182,212,.65); }
      50%      { transform: scale(1.13); box-shadow: 0 0 0 8px rgba(6,182,212,0); }
    }
    .hint-pulse-cyan { animation: hint-glow-cyan 0.85s ease-in-out 3; }

    /* ── 튜토리얼 드래그 애니메이션 ── */
    @keyframes tut-drag {
      0%   { transform: translateX(0) scale(1.1) rotate(-4deg); opacity: .4; }
      15%  { opacity: 1; }
      85%  { transform: translateX(95px) scale(1.0) rotate(2deg); opacity: 1; }
      100% { transform: translateX(100px) scale(1.0) rotate(0deg); opacity: 0; }
    }
    .tut-drag { animation: tut-drag 1.6s cubic-bezier(.4,0,.2,1) forwards; }

    /* ── 푸터 ── */
    .footer-container {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      padding: 0.45rem 1rem;
      background: var(--panel-bg); border-top: 1px solid var(--border-color);
      font-size: 0.68rem; font-weight: 500; color: var(--text-sub); flex-shrink: 0;
      letter-spacing: -0.01em;
    }
    .footer-link { display: inline-flex; align-items: center; opacity: 0.45; transition: opacity 0.2s; text-decoration: none; }
    .footer-link:hover { opacity: 1; }
    .notion-icon { width: 14px; height: 14px; display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const REACTIONS = [
      { id:"r1", name:"과산화수소의 분해", equation:"2H₂O₂(l) ➔ 2H₂O(l) + O₂(g)",
        dH:-196000, dS:125,
        sysAnim:{reactBox:{l:1,g:0,s:0,aq:0},prodBox:{l:1,g:1,s:0,aq:0},text:"기체 입자수 0몰 ➔ 1몰 (증가)",rule:true},
        surrAnim:{isExo:true},
        descSystem:"액체가 기체로 분해되며 계의 분자 자유도가 크게 증가합니다.",
        descSurroundings:"강한 발열 반응으로 주위로 열을 방출하여 주위의 무질서도가 증가합니다.",
        conflict:false },
      { id:"r2", name:"물(얼음)의 융해", equation:"H₂O(s) ➔ H₂O(l)",
        dH:6010, dS:22.0,
        sysAnim:{reactBox:{l:0,g:0,s:1,aq:0},prodBox:{l:1,g:0,s:0,aq:0},text:"고체 ➔ 액체 상태 변화",rule:true},
        surrAnim:{isExo:false},
        descSystem:"고체가 액체로 변하면서 분자의 배열이 흐트러져 계의 엔트로피가 증가합니다.",
        descSurroundings:"흡열 반응으로 주위의 열을 흡수하므로 주위의 엔트로피가 감소합니다.",
        conflict:true },
      { id:"r3", name:"암모니아 합성", equation:"N₂(g) + 3H₂(g) ➔ 2NH₃(g)",
        dH:-92200, dS:-198.7,
        sysAnim:{reactBox:{l:0,g:4,s:0,aq:0},prodBox:{l:0,g:2,s:0,aq:0},text:"기체 입자수 4몰 ➔ 2몰 (감소)",rule:true},
        surrAnim:{isExo:true},
        descSystem:"기체 분자 수가 4몰에서 2몰로 감소하여 계의 무질서도가 감소합니다.",
        descSurroundings:"발열 반응으로 주위로 열을 방출하므로 주위의 엔트로피가 증가합니다.",
        conflict:true },
      { id:"r4", name:"탄산칼슘의 열분해", equation:"CaCO₃(s) ➔ CaO(s) + CO₂(g)",
        dH:178300, dS:160.5,
        sysAnim:{reactBox:{l:0,g:0,s:1,aq:0},prodBox:{l:0,g:1,s:1,aq:0},text:"기체 입자수 0몰 ➔ 1몰 (증가)",rule:true},
        surrAnim:{isExo:false},
        descSystem:"고체에서 기체가 생성되어 계의 무질서도가 크게 증가합니다.",
        descSurroundings:"강한 흡열 반응으로 주위의 열을 빼앗아 주위의 엔트로피가 크게 감소합니다.",
        conflict:true },
      { id:"r5", name:"오존 생성 반응", equation:"3O₂(g) ➔ 2O₃(g)",
        dH:285000, dS:-137,
        sysAnim:{reactBox:{l:0,g:3,s:0,aq:0},prodBox:{l:0,g:2,s:0,aq:0},text:"기체 입자수 3몰 ➔ 2몰 (감소)",rule:true},
        surrAnim:{isExo:false},
        descSystem:"기체 분자 수가 3몰에서 2몰로 감소하여 계의 엔트로피가 감소합니다.",
        descSurroundings:"흡열 반응으로 주위의 열을 빼앗아 주위의 엔트로피도 감소합니다.",
        conflict:false },
      { id:"r6", name:"질산암모늄의 용해", equation:"NH₄NO₃(s) ➔ NH₄⁺(aq) + NO₃⁻(aq)",
        dH:25700, dS:108.7,
        sysAnim:{reactBox:{l:1,g:0,s:1,aq:0},prodBox:{l:1,g:0,s:0,aq:2},text:"이온 입자수 0몰 ➔ 2몰 (증가)",rule:false},
        surrAnim:{isExo:false},
        descSystem:"고체 결정이 물에 녹아 이온으로 흩어지며 계의 엔트로피가 대폭 증가합니다.",
        descSurroundings:"주위의 열을 흡수하여 차가워지므로 주위의 엔트로피는 감소합니다.",
        conflict:true },
    ];

    const SCALE_FACTOR = 0.6;
    const PREDICT_SIZE = 62;
    const BASE_BLK_W  = 46;
    const MAX_BLK_H   = 100;
    const MAX_BLK_W   = 96;

    function computeBlockDims(absVal, isSimulate) {
      if (!isSimulate) return { h: PREDICT_SIZE, w: BASE_BLK_W };
      const rawH = absVal * SCALE_FACTOR;
      if (rawH <= MAX_BLK_H) return { h: Math.max(44, rawH), w: BASE_BLK_W };
      const excess = rawH - MAX_BLK_H;
      return { h: MAX_BLK_H, w: Math.min(MAX_BLK_W, BASE_BLK_W + excess * 0.13) };
    }

    /* ══════════════════════════════════════
       메인 컴포넌트
    ══════════════════════════════════════ */
    function EntropySimulator() {
      const [phase, setPhase]               = useState("predict");
      const [selectedReaction, setSelectedReaction] = useState(REACTIONS[2]);
      const [tempC, setTempC]               = useState(25);
      const [activeModal, setActiveModal]   = useState(null);
      const [sysChoice, setSysChoice]       = useState(null);
      const [surrChoice, setSurrChoice]     = useState(null);
      const [feedback, setFeedback]         = useState({ type: "", message: "" });
      const [dragItem, setDragItem]         = useState(null);
      const [hoverZone, setHoverZone]       = useState(null);
      const [showTutorial, setShowTutorial] = useState(true);
      const [hintPulse, setHintPulse]       = useState(false);
      const [seesawMinH, setSeesawMinH]     = useState(null);

      const seesawRef       = useRef(null);
      const floatingDragRef = useRef(null);
      const initialDragPos  = useRef({ x: 0, y: 0 });
      const hoverZoneRef    = useRef(null);

      const handleSelectReaction = (rxn) => {
        setSelectedReaction(rxn); setPhase("predict");
        setSysChoice(null); setSurrChoice(null);
        setTempC(25); setFeedback({ type:"", message:"" }); setActiveModal(null);
        setSeesawMinH(null);
      };

      /* 튜토리얼 종료 후 3초 뒤 힌트 버튼 강조 */
      useEffect(() => {
        setHintPulse(false);
        if (phase !== "predict" || showTutorial) return;
        const on  = setTimeout(() => setHintPulse(true),  3000);
        const off = setTimeout(() => setHintPulse(false), 6700);
        return () => { clearTimeout(on); clearTimeout(off); };
      }, [selectedReaction.id, phase, showTutorial]);

      useEffect(() => {
        if (!dragItem) return;
        const onMove = (e) => {
          if (floatingDragRef.current)
            floatingDragRef.current.style.transform =
              `translate3d(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%), 0) scale(1.1) rotate(2deg)`;
          if (seesawRef.current) {
            const r = seesawRef.current.getBoundingClientRect();
            if (e.clientX >= r.left && e.clientX <= r.right &&
                e.clientY >= r.top - 80 && e.clientY <= r.bottom + 80) {
              const z = e.clientX < r.left + r.width / 2 ? "decrease" : "increase";
              if (hoverZoneRef.current !== z) { setHoverZone(z); hoverZoneRef.current = z; }
            } else if (hoverZoneRef.current !== null) {
              setHoverZone(null); hoverZoneRef.current = null;
            }
          }
        };
        const onUp = () => {
          if (hoverZoneRef.current) {
            if (dragItem === "system")       setSysChoice(hoverZoneRef.current);
            if (dragItem === "surroundings") setSurrChoice(hoverZoneRef.current);
          }
          setDragItem(null); setHoverZone(null); hoverZoneRef.current = null;
        };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        document.body.style.overflow    = "hidden";
        document.body.style.touchAction = "none";
        return () => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          document.body.style.overflow    = "hidden";
          document.body.style.touchAction = "auto";
        };
      }, [dragItem]);

      const T                   = tempC + 273.15;
      const deltaS_system       = selectedReaction.dS;
      const deltaS_surroundings = -selectedReaction.dH / T;
      const deltaS_total        = deltaS_system + deltaS_surroundings;
      const isSpontaneous       = deltaS_total > 0;
      const correctSysDir       = deltaS_system > 0 ? "increase" : "decrease";
      const correctSurrDir      = deltaS_surroundings > 0 ? "increase" : "decrease";

      const handleCheckPrediction = () => {
        if (!sysChoice || !surrChoice) {
          setFeedback({ type:"error", message:"계와 주위의 엔트로피 블록을 모두 시소보드에 배치해주세요!" }); return;
        }
        if (sysChoice !== correctSysDir && surrChoice !== correctSurrDir)
          setFeedback({ type:"error", message:"❌ 두 블록 모두 방향이 틀렸습니다. 힌트를 열어 단서를 확인해보세요!" });
        else if (sysChoice !== correctSysDir)
          setFeedback({ type:"error", message:"❌ 계의 엔트로피 예측이 틀렸습니다. 힌트에서 기체 분자 수 변화를 확인하세요." });
        else if (surrChoice !== correctSurrDir)
          setFeedback({ type:"error", message:"❌ 주위의 엔트로피 예측이 틀렸습니다. 힌트에서 발열/흡열 여부를 확인하세요." });
        else {
          setFeedback({ type:"success", message:"정답입니다! 👏 아래 온도를 조절하며 자발성의 변화를 관찰하세요." });
          if (seesawRef.current) setSeesawMinH(seesawRef.current.offsetHeight);
          setPhase("simulate");
        }
      };

      const MAX_ANGLE = 11;
      const tiltAngle = phase === "simulate"
        ? Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, deltaS_total * 0.15)) : 0;

      const isSimulate = phase === "simulate";
      const sysDims  = computeBlockDims(Math.abs(deltaS_system),       isSimulate);
      const surrDims = computeBlockDims(Math.abs(deltaS_surroundings), isSimulate);

      const getBlockSide = (type) => {
        if (phase === "predict") {
          const c = type === "system" ? sysChoice : surrChoice;
          if (c === "decrease") return "left";
          if (c === "increase") return "right";
          return null;
        }
        return (type === "system" ? deltaS_system : deltaS_surroundings) < 0 ? "left" : "right";
      };
      const sysSide  = getBlockSide("system");
      const surrSide = getBlockSide("surroundings");

      const ballLeft = phase === "simulate" ? (isSpontaneous ? "94%" : "6%") : "50%";
      const ballRot  = phase === "simulate" ? (isSpontaneous ? 720 : -720) : 0;

      const decLabelCls = phase === "simulate"
        ? (!isSpontaneous ? "opacity-100 scale-105" : "opacity-20")
        : (hoverZone === "decrease" ? "opacity-100 scale-105" : "opacity-60");
      const incLabelCls = phase === "simulate"
        ? (isSpontaneous  ? "opacity-100 scale-105" : "opacity-20")
        : (hoverZone === "increase" ? "opacity-100 scale-105" : "opacity-60");

      return (
        <div className="flex flex-col h-[100dvh] text-slate-800 overflow-hidden"
             style={{ backgroundColor: "var(--bg-color)" }}>

          {/* ── 헤더 ── */}
          <header className="bg-white border-b px-3 py-2 flex items-center gap-2 shadow-sm z-30 shrink-0"
                  style={{ borderColor: "var(--border-color)" }}>
            <h1 className="text-sm md:text-xl font-black text-slate-900 flex items-center gap-1.5 tracking-tight">
              <span style={{ color: "var(--primary-color)" }}>⚖️</span> 엔트로피 자발성 시뮬레이터
            </h1>
            <button onClick={() => setShowTutorial(true)}
              className="ml-auto shrink-0 text-[9px] md:text-xs font-bold px-2 py-1 rounded-xl border-2 btn-press"
              style={{ color:"var(--primary-color)", borderColor:"var(--primary-color)", backgroundColor:"#eef2ff" }}>
              ❓ 이용 방법
            </button>
          </header>

          <div className="flex flex-col lg:flex-row flex-1 overflow-hidden">

            {/* ── 반응 목록 (스크롤바 표시) ── */}
            <aside className="w-full lg:w-64 bg-white border-b lg:border-b-0 lg:border-r
                             overflow-x-auto lg:overflow-y-auto
                             px-2 py-1.5 lg:p-3 flex lg:flex-col gap-1.5 lg:gap-2
                             items-center lg:items-start shrink-0 z-20 shadow-sm rxn-scrollbar"
                   style={{ borderColor: "var(--border-color)" }}>
              <h2 className="hidden lg:block label-xs mb-1 ml-1">반응 목록</h2>
              {REACTIONS.map((rxn) => (
                <button key={rxn.id} onClick={() => handleSelectReaction(rxn)}
                  className={`text-left shrink-0 rounded-xl border-2 transition-colors duration-200 btn-press
                             px-2.5 py-1 lg:p-3 whitespace-nowrap lg:whitespace-normal lg:w-full
                             ${selectedReaction.id === rxn.id
                               ? "border-indigo-500 bg-indigo-50/70 shadow-sm"
                               : "border-slate-100 bg-white hover:border-indigo-200 hover:bg-slate-50"}`}>
                  <div className="font-bold text-[10px] lg:text-sm" style={{ color: "var(--text-main)" }}>
                    {rxn.name}
                  </div>
                  <div className="hidden lg:block text-[9px] font-mono text-slate-500 bg-white px-1 py-0.5 rounded border border-slate-100 inline-block mt-0.5">
                    {rxn.equation}
                  </div>
                </button>
              ))}
            </aside>

            {/* ── 메인 (해설 등장 시 스크롤 가능) ── */}
            <main className="flex-1 flex flex-col overflow-y-auto p-1.5 md:p-3 gap-1.5 md:gap-2"
                  style={{ backgroundColor: "var(--bg-color)" }}>

              {/* 반응 정보 */}
              <div className="ui-panel px-2.5 py-2 md:p-4 shrink-0">
                <div className="flex flex-wrap items-center gap-1 md:gap-2">
                  <h2 className="text-sm md:text-xl font-black tracking-tight" style={{ color: "var(--text-main)" }}>
                    {selectedReaction.name}
                  </h2>
                  <div className="text-[10px] md:text-sm font-mono text-indigo-700 bg-indigo-50/50 px-2 py-1 rounded-lg
                                  inline-flex flex-wrap items-center border border-indigo-100 gap-1.5 font-bold">
                    <span>{selectedReaction.equation}</span>
                    <span className="text-slate-600 bg-white px-1.5 py-0.5 rounded shadow-sm border border-slate-200">
                      ΔH = {(selectedReaction.dH / 1000).toFixed(1)} kJ/mol
                    </span>
                  </div>
                </div>
              </div>

              {/* 예측 패널 */}
              {phase === "predict" && (
                <div className="ui-panel px-2.5 py-2 md:p-4 shrink-0">
                  <p className="text-[9px] md:text-sm font-bold mb-1.5 text-center" style={{ color: "var(--text-sub)" }}>
                    👆 시소의 왼쪽(감소) · 오른쪽(증가)으로 블록을 드래그하세요
                  </p>
                  <div className="flex gap-2">
                    {/* 계 */}
                    <div className="flex-1 rounded-xl border border-amber-100 bg-amber-50 px-2 py-1.5 flex flex-col gap-1">
                      <div className="flex items-center justify-between">
                        <span className="text-[9px] md:text-xs font-black text-amber-900">계 엔트로피</span>
                        <button onClick={() => setActiveModal("system")}
                          className={`text-[8px] md:text-[9px] font-bold text-amber-700 bg-amber-100 hover:bg-amber-200 px-2 py-0.5 rounded-full transition-colors btn-press ${hintPulse ? "hint-pulse-amber" : ""}`}>
                          💡 힌트
                        </button>
                      </div>

    /* ══════════════════════════════════════

    function TutorialModal({ onClose }) {
      const [step, setStep] = useState(0);
      const TOTAL = 3;
      useEffect(() => {
        if (step >= TOTAL - 1) return;
        const t = setTimeout(() => setStep(s => s + 1), 5000);
        return () => clearTimeout(t);
      }, [step]);
      return (
        <div className="fixed inset-0 z-[200] bg-black/75 backdrop-blur-sm flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden" style={{ animation: "fadeIn 0.25s ease" }}>
            <div className="px-5 py-3.5 flex items-center justify-between border-b" style={{ borderColor: "var(--border-color)" }}>
              <div>
                <div className="text-base font-black" style={{ color: "var(--text-main)" }}>🧭 사용법 안내</div>
                <div className="text-[10px] font-bold" style={{ color: "var(--text-sub)" }}>단계를 따라 시뮬레이터를 탐구해보세요</div>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl font-bold leading-none btn-press ml-4">×</button>
            </div>
            <div className="flex justify-center gap-2 pt-4">
              {Array.from({ length: TOTAL }).map((_, i) => (
                <button key={i} onClick={() => setStep(i)}
                  className={`h-1.5 rounded-full transition-all duration-300 ${i === step ? "w-8 bg-indigo-500" : "w-3 bg-slate-200"}`} />
              ))}
            </div>
            <div style={{ minHeight: "260px" }}>
              {step === 0 && <TutStep1 />}
              {step === 1 && <TutStep2 />}
              {step === 2 && <TutStep3 />}
            </div>
            <div className="px-5 pb-5 flex gap-2">
              {step > 0 ? (
                <button onClick={() => setStep(s => s - 1)}
                  className="flex-1 py-2.5 rounded-xl border-2 font-black text-sm btn-press"
                  style={{ borderColor: "var(--border-color)", color: "var(--text-sub)" }}>
                  ← 이전
                </button>
              ) : <div className="flex-1" />}
              {step < TOTAL - 1 ? (
                <button onClick={() => setStep(s => s + 1)}
                  className="flex-1 py-2.5 rounded-xl text-white font-black text-sm btn-press"
                  style={{ backgroundColor: "var(--primary-color)" }}>
                  다음 →
                </button>
              ) : (
                <button onClick={onClose}
                  className="flex-1 py-2.5 rounded-xl text-white font-black text-sm btn-press"
                  style={{ backgroundColor: "var(--primary-color)" }}>
                  시작하기 🚀
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function TutStep1() {
      const [active, setActive] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setActive(a => (a + 1) % 4), 1100);
        return () => clearInterval(t);
      }, []);
      const names = ["과산화수소 분해", "물의 융해", "암모니아 합성", "탄산칼슘"];
      return (
        <div className="px-5 pt-4 pb-2">
          <div className="h-[110px] bg-slate-50 rounded-xl border border-slate-200 flex flex-col items-center justify-center gap-3 p-3 mb-3 overflow-hidden">
            <div className="flex gap-1.5 flex-wrap justify-center">
              {names.map((n, i) => (
                <span key={i} className={`px-2.5 py-1 rounded-lg text-[10px] font-black transition-all duration-500
                  ${i === active ? "bg-indigo-500 text-white shadow-md scale-110 ring-2 ring-indigo-300" : "bg-white text-slate-500 border border-slate-200"}`}>
                  {n}
                </span>
              ))}
            </div>
            <div className="flex items-center gap-1.5 text-[10px] font-bold text-indigo-600">
              <span className="animate-bounce text-base">☝️</span>원하는 반응을 탭하여 선택하세요
            </div>
          </div>
          <div className="font-black text-base text-slate-900 mb-1">① 반응 선택</div>
          <p className="text-sm text-slate-600 leading-relaxed">상단 탭에서 공부할 화학 반응을 선택하세요. 반응식과 ΔH 정보가 표시됩니다.</p>
        </div>
      );
    }

    function TutStep2() {
      const [animKey, setAnimKey] = useState(0);
      const [ph, setPh] = useState(0);
      useEffect(() => {
        setPh(0);
        const t1 = setTimeout(() => setPh(1), 600);
        const t2 = setTimeout(() => setPh(2), 2300);
        const t3 = setTimeout(() => setAnimKey(k => k + 1), 4200);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, [animKey]);
      return (
        <div className="px-5 pt-4 pb-2">
          <div className="h-[110px] bg-slate-50 rounded-xl border border-slate-200 flex flex-col items-center justify-center gap-2 p-3 mb-3 relative overflow-hidden">
            <div className="flex items-center gap-3 w-full">
              <div className="flex flex-col items-center gap-0.5 shrink-0">
                <div className="text-[8px] font-bold text-slate-400">블록</div>
                <div className={`w-11 h-11 rounded-xl bg-amber-100 border-2 border-amber-400 flex flex-col items-center justify-center font-black text-[9px] text-amber-800 shadow transition-all duration-500 ${ph >= 1 ? "opacity-25 scale-90" : "opacity-100 scale-100"}`}>
                  <span></span><span>계</span>
                </div>
              </div>
              <div className="text-slate-300 text-xl font-black">→</div>
              <div className="flex-1 flex flex-col items-center gap-0.5">
                <div className="text-[8px] font-bold text-slate-400">시소 배치</div>
                <div className={`w-full h-11 rounded-xl border-2 border-dashed flex items-center justify-around px-2 transition-all duration-500 ${ph === 2 ? "bg-rose-100 border-rose-400" : "bg-slate-100 border-slate-300"}`}>
                  <span className={`text-[9px] font-black text-rose-500 transition-opacity ${ph === 2 ? "opacity-100" : "opacity-40"}`}>감소↙</span>
                  <span className="text-[9px] text-slate-300">|</span>
                  <span className="text-[9px] font-black text-emerald-500 opacity-40">증가↘</span>
                </div>
              </div>
            </div>
            {ph === 1 && (
              <div key={`fly-${animKey}`}
                   className="absolute w-11 h-11 rounded-xl bg-amber-100 border-2 border-amber-400 flex flex-col items-center justify-center font-black text-[9px] text-amber-800 shadow-xl tut-drag"
                   style={{ left: "14%", top: "calc(50% - 22px)" }}>
                <span></span><span>계</span>
              </div>
            )}
            <div className="text-[9px] font-bold text-slate-500 flex items-center gap-1">
              <span>💡</span>모르면 <span className="text-amber-600 font-black underline">힌트</span> 버튼을 눌러보세요
            </div>
          </div>
          <div className="font-black text-base text-slate-900 mb-1">② 예측 &amp; 블록 배치</div>
          <p className="text-sm text-slate-600 leading-relaxed">
            계·주위 블록을 시소의 <strong>감소(왼쪽)</strong>/<strong>증가(오른쪽)</strong> 구역에 드래그하고 <strong>'정답 확인 및 시소 가동'</strong>을 누르세요.
          </p>
        </div>
      );
    }

    function TutStep3() {
      const [tilted, setTilted] = useState(false);
      const [sliderPct, setSliderPct] = useState(18);
      useEffect(() => {
        const t1 = setTimeout(() => setTilted(true), 500);
        let dir = 1, pct = 18;
        const t2 = setInterval(() => {
          pct += dir * 2.5;
          if (pct > 92) dir = -1;
          if (pct < 5)  dir =  1;
          setSliderPct(pct);
        }, 80);
        return () => { clearTimeout(t1); clearInterval(t2); };
      }, []);
      return (
        <div className="px-5 pt-4 pb-2">
          <div className="h-[110px] bg-slate-50 rounded-xl border border-slate-200 flex flex-col items-center justify-center gap-2 p-3 mb-3">
            <div className="flex items-center gap-2">
              <div className="text-[8px] font-bold text-rose-500">계↘</div>
              <div className="w-28 h-2 rounded-full shadow"
                   style={{ background:"linear-gradient(to right,#94a3b8,#cbd5e1,#94a3b8)", transform:`rotate(${tilted?9:0}deg)`, transition:"transform 0.8s cubic-bezier(0.34,1.56,0.64,1)" }} />
              <div className="text-[8px] font-bold text-emerald-500">주위↗</div>
            </div>
            {tilted && (
              <div className="px-3 py-0.5 rounded-full border-2 border-emerald-400 bg-emerald-50 text-[9px] font-black text-emerald-700" style={{ animation:"fadeIn 0.5s ease" }}>
                ✅ 자발적 진행
              </div>
            )}
            <div className="flex items-center gap-1.5 w-full px-1">
              <span className="text-xs">❄️</span>
              <div className="flex-1 h-1.5 rounded-full relative" style={{ background:"linear-gradient(to right,#38bdf8,#818cf8,#f87171)" }}>
                <div className="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-white border-2 border-indigo-500 shadow-sm"
                     style={{ left:`${sliderPct}%`, transition:"left 0.08s linear" }} />
              </div>
              <span className="text-xs">🔥</span>
            </div>
            <div className="text-[9px] font-bold text-indigo-600">온도에 따라 자발성이 달라져요!</div>
          </div>
          <div className="font-black text-base text-slate-900 mb-1">③ 결과 탐구</div>
          <p className="text-sm text-slate-600 leading-relaxed">
            시소가 기울며 자발성을 보여줘요. <strong>온도 슬라이더</strong>로 자발성이 바뀌는 조건을 탐구하고, 하단 <strong>해설 패널</strong>에서 단계별 논리를 확인하세요.
          </p>
        </div>
      );
    }

    /* ── 드래그용 블록 ── */
    function PredictDraggableBox({ type }) {
      const isS = type === "system";
      const c = isS
        ? { bg:"bg-amber-100", border:"border-amber-400", badge:"bg-amber-200", dark:"text-amber-950" }
        : { bg:"bg-cyan-100",  border:"border-cyan-400",  badge:"bg-cyan-200",  dark:"text-cyan-950" };
      return (
        <div className={`w-[48px] h-[48px] md:w-[58px] md:h-[58px] flex flex-col justify-between items-center overflow-hidden shadow-xl border-t-2 border-x-2 rounded-t-xl ${c.bg} ${c.border}`}>
          <div className={`w-full py-0.5 text-center border-b border-black/5 ${c.badge}`}>
            <span className={`text-[7px] md:text-[8px] font-black tracking-tighter ${c.dark}`}>
              {isS ? "계" : "주위"}
            </span>
          </div>
          <div className="flex-1 flex items-center justify-center w-full relative">
            <div className="absolute inset-0 opacity-10" style={{ backgroundImage:"repeating-linear-gradient(45deg,#000 0,#000 2px,transparent 2px,transparent 10px)" }} />
            <div className="relative z-10 text-base drop-shadow animate-bounce">👆</div>
          </div>
        </div>
      );
    }

    /* ── 엔트로피 블록 (너비 동적 확장 포함) ── */
    function EntropyBox({ type, rawValue, blockH, blockW, phase, predictedDir }) {
      const isS = type === "system";
      const isPos = phase === "predict" ? predictedDir === "increase" : rawValue > 0;
      const absV = Math.abs(rawValue);
      const c = isS
        ? { bg:"bg-amber-100", border:"border-amber-400", text:"text-amber-900", badge:"bg-amber-200", dark:"text-amber-950" }
        : { bg:"bg-cyan-100",  border:"border-cyan-400",  text:"text-cyan-900",  badge:"bg-cyan-200",  dark:"text-cyan-950" };
      return (
        <div className={`relative flex flex-col justify-between items-center overflow-hidden shadow-md ${c.bg} ${c.border} border-t-2 border-x-2 rounded-t-xl`}
             style={{ height:`${blockH}px`, width:`${blockW}px`,
                      transition:"height 0.7s cubic-bezier(0.34,1.56,0.64,1), width 0.7s cubic-bezier(0.34,1.56,0.64,1)" }}>
          <div className={`w-full py-0.5 text-center border-b border-black/5 ${c.badge} shrink-0`}>
            <span className={`text-[6px] md:text-[7px] font-black tracking-tighter ${c.dark}`}>
              {isS ? "계" : "주위"}
            </span>
          </div>
          <div className="flex-1 flex flex-col items-center justify-center p-0.5 text-center w-full relative min-h-0">
            <div className="absolute inset-0 opacity-10" style={{ backgroundImage:"repeating-linear-gradient(45deg,#000 0,#000 2px,transparent 2px,transparent 10px)" }} />
            {phase === "predict" ? (
              <div className={`relative z-10 text-[9px] sm:text-[10px] md:text-sm font-black ${isPos?"text-emerald-700":"text-rose-700"}`}>
                {isPos ? "증가" : "감소"}
              </div>
            ) : (
              <>
                <div className={`relative z-10 text-[8px] sm:text-[10px] font-black leading-none mb-0.5 ${isPos?"text-emerald-700":"text-rose-700"}`}>
                  {isPos ? "증가" : "감소"}
                </div>
                <div className={`relative z-10 text-[5px] md:text-[7px] font-black mb-0.5 ${c.text}`}>
                  {isPos ? "ΔS>0" : "ΔS<0"}
                </div>
                <div className={`relative z-10 text-[6px] md:text-[8px] font-mono font-bold bg-white/80 px-0.5 rounded shadow-sm ${c.dark}`}>
                  {isPos ? "+" : "-"}{absV.toFixed(0)}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ── 힌트 모달: 계 ── */
    function SystemHintModal({ rxn, onClose }) {
      const [stage, setStage] = useState(0);
      useEffect(() => {
        const t1 = setTimeout(() => setStage(1), 1000);
        const t2 = setTimeout(() => setStage(2), 3000);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);
      return (
        <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden" style={{ animation:"fadeIn .2s ease" }}>
            <div className="bg-amber-100 px-4 py-3 flex justify-between items-center border-b border-amber-200">
              <h3 className="font-black text-amber-900 text-sm md:text-base">계의 미시적 상태 변화</h3>
              <button onClick={onClose} className="text-amber-700 hover:text-amber-900 font-bold text-xl leading-none btn-press">&times;</button>
            </div>
            <div className="p-4 flex flex-col items-center">
              <div className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 mb-3 text-center">
                <span className="font-mono font-bold text-indigo-700 text-sm">{rxn.equation}</span>
              </div>
              <div className="w-full h-36 bg-white rounded-xl border-2 border-slate-300 relative overflow-hidden mb-3 shadow-inner">
                <ReactionContainer box={rxn.sysAnim.reactBox} isActive={stage < 2} />
                <ReactionContainer box={rxn.sysAnim.prodBox} isActive={stage >= 1} isFadingIn={stage === 1} />
                {stage === 1 && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/20 backdrop-blur-[1px]">
                    <div className="bg-amber-500 text-white font-black px-4 py-2 rounded-full shadow-lg animate-pulse text-sm">반응 진행 중... ➔</div>
                  </div>
                )}
              </div>
              <div className="h-14 flex flex-col items-center justify-center w-full">
                {stage === 2 && (
                  <>
                    <div className="text-amber-800 font-black text-sm bg-amber-50 px-4 py-1.5 rounded-lg border border-amber-200 mb-1.5" style={{ animation:"fadeIn .3s ease" }}>
                      {rxn.sysAnim.text}
                    </div>
                    {rxn.sysAnim.rule && (
                      <div className="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-md">
                        💡 무질서도: 고체(s) &lt; 액체(l) ≪ 기체(g)
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ReactionContainer({ box, isActive, isFadingIn }) {
      const opacity = isActive ? (isFadingIn ? "0.5" : "1") : "0";
      return (
        <div className="absolute inset-0" style={{ opacity, transition:"opacity 2s" }}>
          {box.g > 0 && Array.from({ length: box.g * 5 }).map((_, i) => (
            <div key={`g${i}`} className="absolute w-10 h-10 rounded-full bg-slate-400/80 shadow-sm flex items-center justify-center"
                 style={{ left:`${Math.random()*70+10}%`, top:`${Math.random()*40+10}%`, animation:`float-gas 3s linear ${Math.random()*3}s infinite` }}>
              <span className="text-[11px] font-black text-white leading-none">기체</span>
            </div>
          ))}
          {(box.l > 0 || box.aq > 0) && (
            <div className="absolute bottom-0 w-full h-[40%] border-t border-blue-400/50 flex flex-col items-center justify-center"
                 style={{ backgroundColor:"rgba(147,197,253,0.3)" }}>
              <div className="absolute top-0 w-full h-1 bg-blue-200/50" style={{ animation:"wave 2s ease-in-out infinite" }} />
              <span className="text-xs font-black text-blue-800/50 z-0 tracking-widest bg-white/30 px-2 py-0.5 rounded">
                {box.aq > 0 ? "수용액(aq)" : "액체(l)"}
              </span>
              {box.aq > 0 && Array.from({ length: box.aq * 5 }).map((_, i) => (
                <div key={`aq${i}`} className="absolute text-[11px] font-black text-blue-800 z-10"
                     style={{ left:`${Math.random()*80+10}%`, top:`${Math.random()*60+10}%`, animation:`float-ion 3s ease-in-out ${Math.random()*2}s infinite alternate` }}>
                  {i % 2 === 0 ? "⊕" : "⊖"}
                </div>
              ))}
            </div>
          )}
          {box.s > 0 && (
            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-[50%] h-[30%] bg-slate-600 rounded-t-lg drop-shadow-md flex items-end justify-center pb-2"
                 style={{ clipPath:"polygon(20% 100%, 80% 100%, 90% 40%, 60% 0%, 30% 10%, 10% 50%)" }}>
              <span className="text-xs font-black text-white/80 bg-black/20 px-2 py-0.5 rounded">고체(s)</span>
            </div>
          )}
        </div>
      );
    }

    /* ── 힌트 모달: 주위 ── */
    function SurrHintModal({ rxn, onClose }) {
      const [stage, setStage] = useState(0);
      const isExo = rxn.surrAnim.isExo;
      const containerRef = useRef(null);
      const PARTICLE_COUNT = 15;
      const particlesRef = useRef(
        Array.from({ length: PARTICLE_COUNT }, () => ({
          x: Math.random()*90+5, y: Math.random()*90+5,
          vx: (Math.random()-.5)*1.5, vy: (Math.random()-.5)*1.5,
        }))
      );
      useEffect(() => { const t = setTimeout(() => setStage(1), 1500); return () => clearTimeout(t); }, []);
      useEffect(() => {
        let raf, cur = 1.0;
        const render = () => {
          const target = stage === 1 ? (isExo ? 3.5 : 0.15) : 1.0;
          cur += (target - cur) * 0.05;
          particlesRef.current.forEach(p => {
            p.x += p.vx*cur; p.y += p.vy*cur;
            if (p.x<=0){p.x=0;p.vx*=-1;} if (p.x>=95){p.x=95;p.vx*=-1;}
            if (p.y<=0){p.y=0;p.vy*=-1;} if (p.y>=90){p.y=90;p.vy*=-1;}
          });
          if (containerRef.current) {
            const ch = containerRef.current.children;
            particlesRef.current.forEach((p, i) => {
              if (ch[i+1]) { ch[i+1].style.left=`${p.x}%`; ch[i+1].style.top=`${p.y}%`; }
            });
          }
          raf = requestAnimationFrame(render);
        };
        render(); return () => cancelAnimationFrame(raf);
      }, [stage, isExo]);
      return (
        <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden flex flex-col" style={{ animation:"fadeIn .2s ease" }}>
            <div className="bg-cyan-100 px-4 py-3 flex justify-between items-center border-b border-cyan-200">
              <h3 className="font-black text-cyan-900 text-sm md:text-base">주위 열 출입 시뮬레이션</h3>
              <button onClick={onClose} className="text-cyan-700 hover:text-cyan-900 font-bold text-xl leading-none btn-press">&times;</button>
            </div>
            <div className="p-4 flex flex-col items-center">
              <div className="w-full px-3 py-2 rounded-lg border shadow-sm flex flex-col items-center gap-1 mb-3 bg-white border-slate-200">
                <span className="font-mono font-bold text-indigo-700 text-sm">{rxn.equation}</span>
                <div className="text-xs font-bold text-slate-700 text-center">
                  ΔH가 <span className={isExo?"text-rose-600":"text-sky-600"}>{isExo?"음수(-)이므로 발열":"양수(+)이므로 흡열"}</span> 반응
                </div>
              </div>
              <div className="w-full h-44 bg-slate-100 rounded-xl relative border-2 border-slate-200 overflow-hidden flex items-center justify-center">
                <div className="absolute top-2 left-3 text-sm font-black text-slate-400 z-20 bg-white/80 px-2 py-1 rounded shadow-sm">주위</div>
                <div ref={containerRef} className="absolute inset-0 pointer-events-none">
                  <div className="hidden" />
                  {Array.from({ length: PARTICLE_COUNT }).map((_, i) => (
                    <div key={i} className="absolute text-xl font-black"
                         style={{ color: stage===1?(isExo?"#ef4444":"rgba(56,189,248,0.4)"):"#94a3b8", transition:"color 2s" }}>●</div>
                  ))}
                </div>
                <div className="w-24 h-24 rounded-full flex items-center justify-center relative z-10 border border-slate-300"
                     style={{ backgroundColor:stage===1?"#cbd5e1":"#e2e8f0", boxShadow:stage===1?"0 0 20px rgba(0,0,0,0.2)":"none",
                              animation:stage===1?"pulse-sys 1s infinite":"none", transition:"background-color 2s" }}>
                  <span className="text-sm font-black text-slate-600 z-20 bg-white/80 px-2 py-1 rounded shadow-sm">계</span>
                  <div className="absolute inset-0 blur-md bg-white/50 rounded-full" />
                </div>
                {stage === 1 && (
                  <div className="absolute inset-0 z-[15] pointer-events-none flex items-center justify-center">
                    {isExo ? (
                      <>
                        <div className="absolute font-black text-rose-500 text-xl -mt-20 animate-bounce">⬆ 열 방출</div>
                        <div className="absolute font-black text-rose-500 text-xl mt-20 animate-bounce rotate-180">⬆</div>
                        <div className="absolute font-black text-rose-500 text-xl -ml-28 animate-bounce -rotate-90">⬆</div>
                        <div className="absolute font-black text-rose-500 text-xl ml-28 animate-bounce rotate-90">⬆</div>
                      </>
                    ) : (
                      <>
                        <div className="absolute font-black text-sky-500 text-xl -mt-20 animate-bounce rotate-180">⬆ 열 흡수</div>
                        <div className="absolute font-black text-sky-500 text-xl mt-20 animate-bounce">⬆</div>
                        <div className="absolute font-black text-sky-500 text-xl -ml-28 animate-bounce rotate-90">⬆</div>
                        <div className="absolute font-black text-sky-500 text-xl ml-28 animate-bounce -rotate-90">⬆</div>
                      </>
                    )}
                  </div>
                )}
              </div>
              <div className="h-10 mt-3 flex items-center justify-center w-full">
                {stage === 1 && (
                  <div className="text-sm font-black bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm text-center" style={{ animation:"fadeIn .3s ease" }}>
                    {isExo
                      ? <>열이 방출되어 주위 입자 운동이 <span className="text-rose-600">활발</span>해짐</>
                      : <>열이 흡수되어 주위 입자 운동이 <span className="text-sky-600">둔</span>해짐</>
                    }
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<EntropySimulator />);
  </script>
</body>
</html>
